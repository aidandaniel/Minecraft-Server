networks:
  monitoring:
    external: true

services:
  mc:
    image: itzg/minecraft-server:latest
    pull_policy: daily
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"

    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - mc-data:/data
    networks:
      - monitoring
